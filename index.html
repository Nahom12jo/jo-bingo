<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jo Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: var(--tg-theme-bg-color, #f0f0f0); 
            color: var(--tg-theme-text-color, #222);
            padding: 10px; 
            margin: 0;
        }
        h1 { color: #ff5722; text-transform: uppercase; }
        
        .bingo-board { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            max-width: 400px; 
            margin: 0 auto; 
        }
        
        .cell { 
            background: var(--tg-theme-secondary-bg-color, #fff); 
            border: 2px solid #ff5722; 
            border-radius: 5px;
            padding: 15px 0; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            user-select: none; 
            transition: 0.2s;
        }
        
        .cell.marked { 
            background: #4CAF50; 
            color: white; 
            border-color: #2E7D32;
        }
        
        .header { 
            background: #ff5722; 
            color: white; 
            cursor: default; 
            border: none;
        }
        
        .action-btn {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 16px;
            background-color: var(--tg-theme-button-color, #ff5722);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <h1>Jo Bingo</h1>
    <div class="bingo-board" id="board"></div>
    <button class="action-btn" onclick="checkBingo()">ቢንጎ በል!</button>

    <script>
        // Telegram Web App ማስተካከያ
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const boardElement = document.getElementById('board');
        const letters = ['B', 'I', 'N', 'G', 'O'];

        // የቢንጎ ራስጌ ፊደላትን መፍጠር
        letters.forEach(letter => {
            const cell = document.createElement('div');
            cell.className = 'cell header';
            cell.innerText = letter;
            boardElement.appendChild(cell);
        });

        // የቢንጎ ቁጥሮችን በዘፈቀደ (Random) መፍጠሪያ
        function generateColumn(min, max) {
            let nums = new Set();
            while(nums.size < 5) nums.add(Math.floor(Math.random() * (max - min + 1)) + min);
            return Array.from(nums);
        }

        const columns = [
            generateColumn(1, 15),
            generateColumn(16, 30),
            generateColumn(31, 45),
            generateColumn(46, 60),
            generateColumn(61, 75)
        ];

        // የቢንጎ ካርዱን ወደ ስክሪን ማምጣት
        for (let row = 0; row < 5; row++) {
            for (let col = 0; col < 5; col++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // መሃል ላይ ያለውን ነፃ ቦታ (FREE) ማዘጋጀት
                if (row === 2 && col === 2) {
                    cell.innerText = "FREE";
                    cell.classList.add('marked');
                } else {
                    cell.innerText = columns[col][row];
                    // ሲነካ ቀለም እንዲቀይር
                    cell.onclick = () => {
                        cell.classList.toggle('marked');
                        tg.HapticFeedback.impactOccurred('light');
                    };
                }
                boardElement.appendChild(cell);
            }
        }

        function checkBingo() {
            // ተጫዋቹ ቢንጎ ሲል ለቴሌግራም መልዕክት ማሳወቂያ
            tg.showAlert("እንኳን ደስ አለህ! Jo Bingo ቦርድህ ተረጋግጧል!");
            // መረጃውን ወደ ጀርባ አገልጋይ (Backend) ለመላክ
            tg.sendData("Bingo_Claimed"); 
        }
    </script>
</body>
</html>
